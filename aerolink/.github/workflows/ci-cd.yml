name: AeroLink CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: ./backend/booking-service
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Unit Tests
        working-directory: ./backend/booking-service
        run: pytest # Assumes test files are present

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: aerolink-booking-service
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./backend/booking-service
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubernetes Manifest
        working-directory: ./backend/k8s
        run: |
          sed -i "s|image: aerolink/booking-service:latest|image: ${{ steps.login-ecr.outputs.registry }}/aerolink-booking-service:${{ github.sha }}|g" booking-service.yaml
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add booking-service.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push
