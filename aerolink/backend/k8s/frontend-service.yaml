apiVersion: v1
kind: ConfigMap
metadata:
  name: aerolink-frontend-config
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AeroLink Cloud Platform</title>
        <style>
            body {
                background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
                color: white;
                font-family: 'Inter', sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
            }
            .glass-panel {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 40px;
                box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.3);
                text-align: center;
            }
            h1 { font-size: 2.5rem; margin-bottom: 10px; }
            p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8; }
            .btn {
                background: #00c6ff;
                background: -webkit-linear-gradient(to right, #0072ff, #00c6ff);
                background: linear-gradient(to right, #0072ff, #00c6ff);
                border: none;
                padding: 15px 30px;
                border-radius: 30px;
                color: white;
                font-weight: bold;
                font-size: 1.1rem;
                cursor: pointer;
                transition: transform 0.2s;
            }
            .btn:hover { transform: scale(1.05); }
        </style>
    </head>
    <body>
        <div class="glass-panel">
            <h1>✈️ AeroLink Cloud Platform</h1>
            <p>Your enterprise-grade GitOps microservices are online.</p>
            <button class="btn" onclick="alert('Connected to EKS API Gateway & RDS Database!')">Check System Status</button>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: aerolink-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
