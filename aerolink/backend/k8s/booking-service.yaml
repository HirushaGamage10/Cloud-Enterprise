apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: default
  labels:
    app: booking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject: "false"
    spec:
      containers:
      - name: booking-service
        image: 806490632128.dkr.ecr.eu-west-1.amazonaws.com/aerolink-booking-service:18a2c2a
        imagePullPolicy: Always
        env:
        - name: KAFKA_BROKER_URL
          value: "aerolink-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: booking-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
