apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject: "false"
    spec:
      containers:
      - name: flight-service
        image: 806490632128.dkr.ecr.eu-west-1.amazonaws.com/aerolink-flight-service:b8021b6
        imagePullPolicy: Always
        env:
        - name: KAFKA_BROKER_URL
          value: "aerolink-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
        ports:
        - containerPort: 8001
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: flight-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: flight-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8001
