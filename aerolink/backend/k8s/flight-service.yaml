apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
    spec:
      containers:
      - name: flight-service
        image: 806490632128.dkr.ecr.eu-west-1.amazonaws.com/aerolink-flight-service:b0b3604
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: flight-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: flight-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8001
