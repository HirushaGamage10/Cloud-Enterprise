apiVersion: apps/v1
kind: Deployment
metadata:
  name: baggage-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: baggage-service
  template:
    metadata:
      labels:
        app: baggage-service
    spec:
      containers:
      - name: baggage-service
        image: 806490632128.dkr.ecr.eu-west-1.amazonaws.com/aerolink-baggage-service:latest
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: baggage-service
  namespace: default
spec:
  selector:
    app: baggage-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8002
