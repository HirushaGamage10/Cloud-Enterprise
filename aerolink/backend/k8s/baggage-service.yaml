apiVersion: apps/v1
kind: Deployment
metadata:
  name: baggage-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: baggage-service
  template:
    metadata:
      labels:
        app: baggage-service
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject: "false"
    spec:
      containers:
      - name: baggage-service
        image: 806490632128.dkr.ecr.eu-west-1.amazonaws.com/aerolink-baggage-service:0fd0eb1
        imagePullPolicy: Always
        env:
        - name: KAFKA_BROKER_URL
          value: "aerolink-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: AWS_REGION
          value: "eu-west-1"
        - name: BAGGAGE_DYNAMODB_TABLE
          value: "AeroLinkBaggage-production"
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: baggage-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: baggage-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8002
